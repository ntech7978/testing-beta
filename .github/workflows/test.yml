name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # Honor the module-level test guard (e.g. messaging/slack/interface.py
      # skips its /workspace/logs mkdir when this is set), so importing real
      # interface modules is safe in CI where the checkout isn't under /workspace.
      NINJA_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: infra/requirements.txt

      - name: Install dependencies
        # Install the project's real runtime deps (same list install.sh uses).
        # Importing a leaf module pulls in its package, so the suite needs the
        # full dependency set — not a hand-picked subset. Tests are still
        # network-free (requests/httpx are mocked), so no secrets are needed.
        run: |
          python -m pip install --upgrade pip
          pip install -r infra/requirements.txt

      - name: Run tests
        run: python -m pytest -v
